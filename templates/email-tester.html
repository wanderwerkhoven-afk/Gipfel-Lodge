    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #f0f2f5; }
        .sidebar { width: 500px; background: #ffffff; border-right: 1px solid #e1e4e8; padding: 25px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .preview-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 30px; overflow-y: auto; }
        h2 { margin-top: 0; font-size: 1.3rem; color: #1a1a1a; margin-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; font-weight: 600; color: #4a4a4a; }
        textarea { padding: 12px; border: 1px solid #C5A059; border-radius: 6px; font-size: 0.95rem; width: 100%; box-sizing: border-box; resize: vertical; min-height: 120px; font-family: inherit; line-height: 1.5; background: #fffcf8; }
        textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(197,160,89, 0.2); }
        .readonly-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; padding: 12px; font-size: 0.9rem; color: #6c757d; display: flex; flex-direction: column; gap: 8px; }
        .readonly-row { display: flex; justify-content: space-between; border-bottom: 1px solid #e9ecef; padding-bottom: 4px; }
        .readonly-row:last-child { border-bottom: none; padding-bottom: 0; }
        .readonly-row strong { color: #343a40; min-width: 120px; }
        .btn-primary { background: #28a745; color: white; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-size: 1.05rem; font-weight: bold; text-align: center; margin-top: 15px; transition: background 0.2s; }
        .btn-primary:hover { background: #218838; }
        .btn-primary:disabled { background: #6c757d; cursor: not-allowed; }
        .iframe-container { width: 100%; max-width: 800px; background: transparent; border: none; height: calc(100vh - 60px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background-color: #FAF9F6; }
        #statusMessage { margin-top: 10px; padding: 12px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; display: none; text-align: center; }
        .status-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .config-toggle { cursor: pointer; color: #007bff; font-size: 0.8rem; text-decoration: underline; text-align: center; margin-top: 10px; }
        .config-box { background: #fff; border: 1px dashed #ccc; padding: 15px; border-radius: 6px; display: none; margin-top: 10px; }
        .config-box input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        /* Responsive Mobile Taps */
        .tab-nav {
            display: none;
            background: #fff;
            border-bottom: 1px solid #e1e4e8;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border-radius: 6px;
        }

        .tab-btn.active {
            background: var(--color-gold, #C5A059);
            color: white;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; height: 100vh; overflow: hidden; }
            .tab-nav { display: flex; gap: 10px; flex-shrink: 0; }
            .sidebar { 
                width: 100%; 
                border-right: none; 
                display: none; /* Hidden by default on mobile, shown by tabs */
                flex: 1;
                overflow-y: auto;
            }
            .sidebar.active { display: flex; }
            .preview-area { 
                padding: 15px 10px; 
                display: none; /* Hidden by default on mobile, shown by tabs */
                background: #f0f2f5;
                flex: 1;
                box-sizing: border-box;
                overflow-y: auto;
            }
            .preview-area.active { display: flex; }
            .iframe-container { 
                width: 100%;
                height: 100%; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
                border-radius: 12px; 
                background: #fff;
            }
        }
    </style>
</head>
<body>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('edit')">Aanpassen</button>
        <button class="tab-btn" onclick="switchTab('preview')">Voorbeeld</button>
    </div>

    <div class="sidebar active">
        <h2>Gipfel Lodge - Snel E-mailen</h2>
        <p style="font-size: 0.85rem; color: #666; margin-top: -10px; margin-bottom: 5px;">
            Controleer de teksten en klik op verzenden.
        </p>

        <div class="readonly-box" id="readonlyData">
            <!-- Populated by JS -->
        </div>

        <h3 style="margin-bottom: 5px; font-size: 1rem; border-bottom: 1px solid #eee; padding-bottom: 5px;">Aanpasbare Teksten</h3>
        
        <div class="control-group">
            <label>Introductie (Bovenste bericht)</label>
            <textarea id="email_intro"></textarea>
        </div>

        <div class="control-group">
            <label>Afsluiting (Onderste bericht)</label>
            <textarea id="email_closing"></textarea>
        </div>

        <button id="sendBtn" class="btn-primary">Verstuur E-mail Nu</button>
        <div id="statusMessage"></div>
        <button class="btn-primary" id="closeBtn" style="background: #e2e6ea; color: #333; display: none;" onclick="window.close()">Sluit Venster</button>

        <span class="config-toggle" onclick="document.getElementById('configPanel').style.display = document.getElementById('configPanel').style.display === 'none' ? 'block' : 'none'">⚙️ API Instellingen Beheren</span>
        <div id="configPanel" class="config-box">
            <label style="font-size: 0.8rem;">Public Key</label><input type="text" id="emailjs_public_key">
            <label style="font-size: 0.8rem;">Service ID</label><input type="text" id="emailjs_service_id">
            <label style="font-size: 0.8rem;">Template ID</label><input type="text" id="emailjs_template_id">
        </div>
    </div>

    <div class="preview-area">
        <div class="iframe-container">
            <iframe id="emailPreview"></iframe>
        </div>
    </div>

    <script>
        // Sync changes back to parent
        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
            el.addEventListener('input', () => {
                const id = el.id.replace('editable-', 'email_');
                window.parent.syncFromPreview(id, el.innerText);
            });
            // Prevent accidental formatting (keep it plain text)
            el.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        });

            const el = document.getElementById(id);
            if (el) {
                // Update textarea value without triggering full preview refresh
                // to avoid losing cursor position/focus in the preview
                el.value = text;
            }
        };

        function switchTab(tab) {
            const sidebar = document.querySelector('.sidebar');
            const preview = document.querySelector('.preview-area');
            const btns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'edit') {
                sidebar.classList.add('active');
                preview.classList.remove('active');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {

                email_visit_website: 'Naar de website', format: 'standard'

        const configIds = ['emailjs_public_key', 'emailjs_service_id', 'emailjs_template_id'];
        let activeData = {};

        function init() {
            // Load URL Params
            const urlParams = new URLSearchParams(window.location.search);
            const typeVar = urlParams.get('type') || 'acceptance';
            
            const preset = templatesData[typeVar];
            activeData = {
                type: typeVar,
                id: urlParams.get('id') || '',
                name: decodeURIComponent(urlParams.get('name') || 'Familie Voorbeeld'),
                email: decodeURIComponent(urlParams.get('email') || 'gast@email.nl'),
                checkin: decodeURIComponent(urlParams.get('checkin') || '12 Dec 2026'),
                checkout: decodeURIComponent(urlParams.get('checkout') || '19 Dec 2026'),
                guests: decodeURIComponent(urlParams.get('guests') || 'Onbekend'),
                message: decodeURIComponent(urlParams.get('message') || ''),
                tot: decodeURIComponent(urlParams.get('tot') || '€ 2.500,00'),
                dep: decodeURIComponent(urlParams.get('dep') || '€ 750,00'),
                bal: decodeURIComponent(urlParams.get('bal') || '€ 1.750,00'),
                ...preset
            };

            // Populate locked data view
            document.getElementById('readonlyData').innerHTML = `
                <div class="readonly-row"><strong>Sjabloon:</strong> <span>${typeVar.toUpperCase()}</span></div>
                <div class="readonly-row"><strong>Ontvanger:</strong> <span>${activeData.email}</span></div>
                <div class="readonly-row"><strong>Gast:</strong> <span>${activeData.name}</span></div>
                <div class="readonly-row"><strong>Data:</strong> <span>${activeData.checkin} t/m ${activeData.checkout}</span></div>
                <div class="readonly-row"><strong>Reisgezelschap:</strong> <span>${activeData.guests}</span></div>
            `;

            // Populate Textareas
            document.getElementById('email_intro').value = activeData.defaultIntro;
            document.getElementById('email_closing').value = activeData.defaultClosing;

            // API Config
            configIds.forEach(id => {
                const saved = localStorage.getItem(id);
                if (saved) document.getElementById(id).value = saved;
                document.getElementById(id).addEventListener('change', e => localStorage.setItem(id, e.target.value));
            });

            // Listeners
            ['email_intro', 'email_closing'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
            document.getElementById('sendBtn').addEventListener('click', sendEmail);

            updatePreview();
        }

        function generateDetailsHtml(format) {
            let baseDetails = `
                <div class="detail-row"><div class="label">Aankomst & Vertrek</div><div class="value">${activeData.checkin} &mdash; ${activeData.checkout}</div></div>
                <div class="detail-row"><div class="label">Reisgezelschap</div><div class="value">${activeData.guests}</div></div>
            `;
            
            if (format === 'deposit_request') {
                return baseDetails + `
                    <div class="detail-row"><div class="label">Totaalprijs</div><div class="value">${activeData.tot}</div></div>
                    <div class="detail-row"><div class="label">Aanbetaling (30%)</div><div class="value" style="color: #c47e09; font-weight: 700;">${activeData.dep}</div></div>
                `;
            } else if (format === 'deposit_received') {
                return baseDetails + `
                    <div class="detail-row"><div class="label">Ontvangen Aanbetaling</div><div class="value" style="color: #295e1e; font-weight: 700;">${activeData.dep}</div></div>
                `;
            } else if (format === 'balance_reminder') {
                return baseDetails + `
                    <div class="detail-row"><div class="label" style="opacity: 0.6;">Totaalprijs</div><div class="value" style="font-size: 14px; opacity: 0.6;">${activeData.tot}</div></div>
                    <div class="detail-row"><div class="label" style="opacity: 0.6;">Reeds Voldoen (Aanbetaling)</div><div class="value" style="font-size: 14px; opacity: 0.6;">${activeData.dep}</div></div>
                    <div class="detail-row" style="background-color: #fef0d9; margin: 10px -25px -25px -25px; padding: 25px; border-radius: 0 0 8px 8px; border-top: 1px solid #fae4c1;">
                        <div class="label" style="color: #a56100;">Nog te voldoen (Restbedrag)</div>
                        <div class="value" style="color: #c47e09; font-weight: 700; font-size: 18px;">${activeData.bal}</div>
                    </div>
                `;
            } else if (format === 'balance_received') {
                return baseDetails + `
                    <div class="detail-row"><div class="label" style="opacity: 0.6;">Totaalprijs</div><div class="value" style="font-size: 14px; opacity: 0.6;">${activeData.tot}</div></div>
                    <div class="detail-row" style="background-color: #eef3eb; margin: 10px -25px -25px -25px; padding: 25px; border-radius: 0 0 8px 8px; border-top: 1px solid #d5e9cc;">
                        <div class="label" style="color: #295e1e;">Betalingsstatus</div>
                        <div class="value" style="color: #295e1e; font-weight: 700; font-size: 18px;">VOLLEDIG VOLDAAN</div>
                    </div>
                `;
            } else if (format === 'rules_info') {
                return `
                    <div class="detail-row"><div class="label">Inchecken</div><div class="value">Vanaf 15:00 uur</div></div>
                    <div class="detail-row"><div class="label">Uitchecken</div><div class="value">Uiterlijk 10:00 uur</div></div>
                    <div class="detail-row"><div class="label" style="opacity: 0.8;">Aankomstdatum</div><div class="value" style="font-size: 14px;">${activeData.checkin}</div></div>
                    <div class="detail-row" style="background-color: #faf9f6; margin: 10px -25px -25px -25px; padding: 25px; border-radius: 0 0 8px 8px; border-top: 1px solid #e0e4e8;">
                        <div class="label" style="color: #78868A;">Wifi Netwerk</div>
                        <div class="value" style="color: #20303D; font-weight: 700;">GipfelLodge_Guest<br>
                        <span style="font-size: 13px; font-weight: 500; opacity: 0.8; letter-spacing: 1px;">WACHTWOORD: AlpinerLuxus2026</span></div>
                    </div>
                `;
            } else if (format === 'acceptance') {
                return baseDetails;
            } else {
                return baseDetails + (activeData.message ? `<div class="detail-row"><div class="label" style="text-align:left;">Bericht</div><div class="value" style="font-size:13px; font-weight:400; text-align:right;">${activeData.message}</div></div>` : '');
            }
        }

        function generateExtraContent(format) {
            if (format === 'acceptance') {
                return `
                    <p class="intro-text" style="font-weight: 600; margin-bottom: 20px;">Belangrijke informatie voor uw verblijf:</p>
                    <div class="info-card"><div class="info-title">1. Betaling</div><p class="info-desc">Om uw reservering definitief te maken, vragen wij een aanbetaling van 30%. Het restbedrag dient uiterlijk 6 weken voor aankomst te worden voldaan. De factuur volgt.</p></div>
                    <div class="info-card"><div class="info-title">2. Aankomst & Vertrek</div><p class="info-desc">Inchecken vanaf <strong>15:00 uur</strong>. Uitchecken uiterlijk <strong>10:00 uur</strong>.</p></div>
                    <div class="info-card"><div class="info-title">3. Huisregels</div><p class="info-desc">Gipfel Lodge is rookvrij. Voor aankomst ontvangt u de toegangscode en huisinformatie.</p></div>
                `;
            } else if (format === 'deposit_request') {
                return `
                    <div class="info-card"><div class="info-title">Betaalinstructies</div><p class="info-desc">Om uw reservering definitief te bevestigen, verzoeken we u vriendelijk om de aanbetaling uiterlijk binnen 7 dagen over te maken op het opgegeven rekeningnummer.</p></div>
                `;
            } else if (format === 'deposit_received') {
                return `
                    <div class="info-card"><div class="info-title">Restbetaling</div><p class="info-desc">Het resterende bedrag ontvangen we graag uiterlijk 6 weken voor aankomst op dezelfde rekening. We sturen ruim op tijd nog een vriendelijke herinnering hiervoor!</p></div>
                `;
            } else if (format === 'balance_reminder') {
                return `
                    <div class="info-card"><div class="info-title">Betaalinstructies</div><p class="info-desc">Om alles in orde te maken voor je aankomst verzoeken we je het restbedrag uiterlijk te voldoen middels een bankoverschrijving naar onze rekening.</p></div>
                `;
            } else if (format === 'balance_received') {
                return `
                    <div class="info-card"><div class="info-title">Voorpret!</div><p class="info-desc">Het grote aftellen is inmiddels natuurlijk al begonnen. Binnenkort sturen we je nog de laatste "Pre-Stay" details zodat je soepel kunt arriveren.</p></div>
                `;
            } else if (format === 'rules_info') {
                return `
                    <p class="tagline" style="font-size: 11px; color: #78868A; margin-top: 35px; color: #C5A059;">Lodge Etiquette</p>
                    <h2 class="heading" style="font-size: 22px;">Onze Huisregels</h2>
                    <table class="rule-table" cellpadding="0" cellspacing="0" border="0" style="width: 100%; margin-bottom: 25px;">
                        <tr><td style="color: #C5A059; padding-right: 10px; font-weight: bold; vertical-align:top;">&bull;</td><td style="padding-bottom: 15px; font-size: 14px; line-height: 1.5; color: #20303D;"><strong>Schoeisel:</strong> In de lodge dragen we graag pantoffels. Natte of vieze bergschoenen en skischoenen kun je veilig achterlaten in de skiruimte.</td></tr>
                        <tr><td style="color: #C5A059; padding-right: 10px; font-weight: bold; vertical-align:top;">&bull;</td><td style="padding-bottom: 15px; font-size: 14px; line-height: 1.5; color: #20303D;"><strong>Rust en Respect:</strong> Uit respect voor de andere gasten en de omwonenden, hanteren we een rustige nachtrust tussen 22:00 uur en 07:00 uur.</td></tr>
                        <tr><td style="color: #C5A059; padding-right: 10px; font-weight: bold; vertical-align:top;">&bull;</td><td style="padding-bottom: 15px; font-size: 14px; line-height: 1.5; color: #20303D;"><strong>Rookvrij:</strong> De binnenkant van Gipfel Lodge is strikt rookvrij. Roken kan buiten op de balkons of het terras bij de asbakken.</td></tr>
                        <tr><td style="color: #C5A059; padding-right: 10px; font-weight: bold; vertical-align:top;">&bull;</td><td style="padding-bottom: 15px; font-size: 14px; line-height: 1.5; color: #20303D;"><strong>Afval Scheiden:</strong> Oostenrijk is streng op afval scheiden. Onder de gootsteen vind je verschillende bakken. Containers staan buiten.</td></tr>
                    </table>
                `;
            }
            return '';
        }

        function generateAlertBanner(format) {
            if (format === 'acceptance') {
                return `<tr><td class="alert-banner" style="background-color: #eef3eb; padding: 14px 30px; text-align: center; border-bottom: 1px solid #d5e9cc;"><p style="margin: 0; color: #295e1e; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">&#10003;&nbsp; Boeking Geaccepteerd</p></td></tr>`;
            } else if (format === 'deposit_request') {
                return `<tr><td class="alert-banner" style="background-color: #fef0d9; padding: 14px 30px; text-align: center; border-bottom: 1px solid #fae4c1;"><p style="margin: 0; color: #a56100; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">€&nbsp; Aanbetaling Vereist</p></td></tr>`;
            } else if (format === 'deposit_received') {
                return `<tr><td class="alert-banner" style="background-color: #eef3eb; padding: 14px 30px; text-align: center; border-bottom: 1px solid #d5e9cc;"><p style="margin: 0; color: #295e1e; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">&#10003;&nbsp; Aanbetaling Ontvangen</p></td></tr>`;
            } else if (format === 'balance_reminder') {
                return `<tr><td class="alert-banner" style="background-color: #fef0d9; padding: 14px 30px; text-align: center; border-bottom: 1px solid #fae4c1;"><p style="margin: 0; color: #a56100; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">€&nbsp; Laatste Actie Vereist</p></td></tr>`;
            } else if (format === 'balance_received') {
                return `<tr><td class="alert-banner" style="background-color: #eef3eb; padding: 14px 30px; text-align: center; border-bottom: 1px solid #d5e9cc;"><p style="margin: 0; color: #295e1e; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">&#10003;&nbsp; Restbetaling Ontvangen</p></td></tr>`;
            } else if (format === 'rules_info') {
                return `<tr><td class="alert-banner" style="background-color: #f7f9fa; padding: 14px 30px; text-align: center; border-bottom: 1px solid #e0e4e8;"><p style="margin: 0; color: #78868A; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">&#10548;&nbsp; Pre-Stay Informatie & Huisregels</p></td></tr>`;
            }
            return '';
        }

        function getCompiledParams() {
            // we use the live textarea values but parse newlines to <br> for HTML preview
            const introRaw = document.getElementById('email_intro').value;
            const closingRaw = document.getElementById('email_closing').value;
            const introHtml = introRaw.replace(/\n/g, '<br>');
            const closingHtml = closingRaw.replace(/\n/g, '<br>');

            return {
                themeColor: activeData.themeColor,
                email_tagline: activeData.email_tagline,
                email_heading: activeData.email_heading,
                email_intro: introHtml,
                user_name: activeData.name,
                check_in: activeData.checkin,
                check_out: activeData.checkout,
                guests: activeData.guests,
                message: activeData.message,
                to_email: activeData.email,
                email_closing: closingHtml,
                email_visit_website: activeData.email_visit_website,
                total_price: activeData.tot,
                deposit_amount: activeData.dep,
                balance_amount: activeData.bal,
                details_html: generateDetailsHtml(activeData.format),
                extra_content: generateExtraContent(activeData.format),
                alert_banner: generateAlertBanner(activeData.format)
            };
        }

        function updatePreview() {
            const params = getCompiledParams();
            let html = document.getElementById('rawTemplate').innerHTML;

            html = html.replace(/\{\{\{?([a-zA-Z0-9_]+)\}\}\}?/g, (match, key) => {
                return params[key] !== undefined ? params[key] : match;
            });

            const iframe = document.getElementById('emailPreview');
            const doc = iframe.contentWindow.document;
            doc.open(); doc.write(html); doc.close();
        }

        function sendEmail() {
            const publicKey = document.getElementById('emailjs_public_key').value;
            const serviceId = document.getElementById('emailjs_service_id').value;
            const templateId = document.getElementById('emailjs_template_id').value;

            if (!publicKey || !serviceId || !templateId) {
                showStatus("Fout: Vul eerst de API Keys in (klik onderaan op ⚙️ API Instellingen)", false);
                document.getElementById('configPanel').style.display = 'block';
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerText = "Bezig met verzenden...";
            showStatus("");

            emailjs.init({ publicKey: publicKey });
            const params = getCompiledParams();

            emailjs.send(serviceId, templateId, params)
                .then(function() {
                    showStatus("Succes! De e-mail is direct verzonden naar " + activeData.email, true);
                    
                    // Notify parent to check off the step in the mailchain
                    if (window.parent && activeData.id) {
                        window.parent.postMessage({
                            type: 'emailSent',
                            id: activeData.id,
                            emailType: activeData.type
                        }, '*');
                    }

                    sendBtn.style.display = 'none';
                    document.getElementById('closeBtn').style.display = 'block';
                }, function(error) {
                    console.error("FAILED...", error);
                    showStatus("Fout bij verzenden: Controleer console en API keys.", false);
                    sendBtn.disabled = false;
                    sendBtn.innerText = "Probeer Opnieuw";
                });
        }

        function showStatus(msg, isSuccess) {
            const el = document.getElementById('statusMessage');
            if(!msg) { el.style.display = 'none'; return; }
            el.innerText = msg; el.style.display = 'block';
            el.className = isSuccess ? 'status-success' : 'status-error';
        }

        window.onload = init;
    </script>
</body>
</html>
