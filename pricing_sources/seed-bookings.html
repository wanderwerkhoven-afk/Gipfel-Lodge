function log(msg, cls) {

    el.innerHTML += '<div class="'+(cls||'info')+'">'+msg+'</div>';
    el.scrollTop = el.scrollHeight;
}

        docFn = fbStore.doc;
        setDocFn = fbStore.setDoc;
        serverTs = fbStore.serverTimestamp;
        log('✅ Firebase verbonden!', 'ok');
    } catch(e) {
        log('❌ Firebase fout: ' + e.message, 'err');

        btn.textContent = '▶ Opnieuw proberen';
        return;

            await setDocFn(docFn(db, "bookings", b.id), record);
            success++;
            log('✅ ' + b.id + ' — ' + b.guestName + ' (' + b.checkIn + ' → ' + b.checkOut + ')', 'ok');
        } catch(err) {
            failed++;
            log('❌ ' + b.id + ' — ' + err.message, 'err');
        }
        document.getElementById('progress-bar').style.width = Math.round(((i+1)/BOOKINGS.length)*100) + '%';
    }
